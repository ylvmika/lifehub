<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskFlow — Time Blocking Planner</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0c0c10;
    --bg2: #13131a;
    --bg3: #1a1a24;
    --bg4: #22222f;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --text: #e8e6f0;
    --text2: #9896a8;
    --text3: #5e5c6e;
    --accent: #f0c040;
    --accent2: #e8a020;

    --cat-work: #4f8ef7;
    --cat-work-bg: rgba(79,142,247,0.15);
    --cat-personal: #e07de0;
    --cat-personal-bg: rgba(224,125,224,0.15);
    --cat-health: #4ecba0;
    --cat-health-bg: rgba(78,203,160,0.15);
    --cat-creative: #f47c50;
    --cat-creative-bg: rgba(244,124,80,0.15);
    --cat-learning: #f0c040;
    --cat-learning-bg: rgba(240,192,64,0.15);
    --cat-other: #9896a8;
    --cat-other-bg: rgba(152,150,168,0.15);

    --sidebar-w: 280px;
    --header-h: 64px;
    --hour-h: 64px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ─── HEADER ───────────────────────────────── */
  header {
    height: var(--header-h);
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 24px;
    gap: 24px;
    flex-shrink: 0;
    position: relative;
    z-index: 50;
  }

  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: -0.5px;
    white-space: nowrap;
    margin-right: 8px;
  }
  .logo span { color: var(--text2); font-weight: 400; }

  .header-nav {
    display: flex;
    align-items: center;
    gap: 4px;
    background: var(--bg3);
    border-radius: 10px;
    padding: 4px;
    border: 1px solid var(--border);
  }
  .view-btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    padding: 6px 14px;
    border-radius: 7px;
    border: none;
    background: transparent;
    color: var(--text2);
    cursor: pointer;
    transition: all 0.18s;
    letter-spacing: 0.3px;
  }
  .view-btn:hover { color: var(--text); background: var(--bg4); }
  .view-btn.active {
    background: var(--accent);
    color: #0c0c10;
    font-weight: 600;
  }

  .header-date-nav {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-left: 8px;
  }
  .date-nav-btn {
    width: 30px; height: 30px;
    border-radius: 8px;
    border: 1px solid var(--border2);
    background: var(--bg3);
    color: var(--text2);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    transition: all 0.15s;
  }
  .date-nav-btn:hover { background: var(--bg4); color: var(--text); }

  .header-date-label {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    min-width: 140px;
    text-align: center;
  }

  .today-btn {
    font-size: 11px;
    font-weight: 600;
    padding: 5px 10px;
    border-radius: 7px;
    border: 1px solid var(--border2);
    background: transparent;
    color: var(--text2);
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .today-btn:hover { background: var(--bg4); color: var(--text); }

  .header-spacer { flex: 1; }

  .add-task-btn {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 8px 18px;
    background: var(--accent);
    color: #0c0c10;
    border: none;
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.18s;
    letter-spacing: 0.2px;
  }
  .add-task-btn:hover { background: var(--accent2); transform: translateY(-1px); }

  /* ─── LAYOUT ────────────────────────────────── */
  .app-body {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ─── SIDEBAR ───────────────────────────────── */
  aside {
    width: var(--sidebar-w);
    background: var(--bg2);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    overflow: hidden;
  }

  .sidebar-section {
    padding: 18px 16px 10px;
  }
  .sidebar-section-title {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: var(--text3);
    margin-bottom: 10px;
    padding: 0 4px;
  }

  /* Categories */
  .cat-list { display: flex; flex-direction: column; gap: 3px; }
  .cat-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.15s;
    font-size: 13px;
    font-weight: 500;
    color: var(--text2);
    position: relative;
  }
  .cat-item:hover { background: var(--bg3); color: var(--text); }
  .cat-item.active { background: var(--bg3); color: var(--text); }
  .cat-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .cat-count {
    margin-left: auto;
    font-size: 10px;
    font-family: 'DM Mono', monospace;
    color: var(--text3);
    background: var(--bg4);
    padding: 2px 7px;
    border-radius: 20px;
  }

  /* Task List */
  .task-list-scroll {
    flex: 1;
    overflow-y: auto;
    padding: 0 16px 16px;
  }
  .task-list-scroll::-webkit-scrollbar { width: 4px; }
  .task-list-scroll::-webkit-scrollbar-track { background: transparent; }
  .task-list-scroll::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 4px; }

  .task-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 10px;
    border-radius: 9px;
    margin-bottom: 4px;
    cursor: pointer;
    transition: background 0.15s;
    border: 1px solid transparent;
  }
  .task-item:hover { background: var(--bg3); }
  .task-item.dragging { opacity: 0.5; }

  .task-check {
    width: 16px; height: 16px;
    border-radius: 50%;
    border: 2px solid var(--border2);
    flex-shrink: 0;
    margin-top: 1px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
    cursor: pointer;
  }
  .task-check.done {
    background: var(--cat-health);
    border-color: var(--cat-health);
  }
  .task-check.done::after {
    content: '✓';
    font-size: 9px;
    color: #0c0c10;
    font-weight: 700;
  }

  .task-info { flex: 1; min-width: 0; }
  .task-title {
    font-size: 12.5px;
    font-weight: 500;
    color: var(--text);
    line-height: 1.4;
    transition: color 0.15s;
  }
  .task-item.done .task-title {
    text-decoration: line-through;
    color: var(--text3);
  }
  .task-meta {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 3px;
  }
  .task-cat-badge {
    font-size: 10px;
    padding: 1px 7px;
    border-radius: 20px;
    font-weight: 500;
  }
  .task-time-badge {
    font-size: 10px;
    font-family: 'DM Mono', monospace;
    color: var(--text3);
  }
  .task-delete {
    width: 20px; height: 20px;
    border-radius: 6px;
    border: none;
    background: transparent;
    color: var(--text3);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px;
    opacity: 0;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .task-item:hover .task-delete { opacity: 1; }
  .task-delete:hover { background: rgba(255,80,80,0.15); color: #ff5050; }

  .empty-tasks {
    text-align: center;
    padding: 24px 16px;
    color: var(--text3);
    font-size: 12px;
    line-height: 1.6;
  }

  /* ─── MAIN CALENDAR ─────────────────────────── */
  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Day Headers */
  .cal-header {
    display: flex;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    background: var(--bg2);
  }
  .cal-time-gutter {
    width: 60px;
    flex-shrink: 0;
  }
  .cal-day-headers {
    display: flex;
    flex: 1;
  }
  .cal-day-head {
    flex: 1;
    padding: 12px 12px 10px;
    text-align: center;
    border-left: 1px solid var(--border);
    cursor: pointer;
  }
  .cal-day-head.today .day-num {
    background: var(--accent);
    color: #0c0c10;
  }
  .day-name {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    font-weight: 600;
    color: var(--text3);
    margin-bottom: 4px;
  }
  .day-num {
    font-size: 20px;
    font-family: 'Playfair Display', serif;
    font-weight: 600;
    color: var(--text);
    width: 36px; height: 36px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto;
    transition: background 0.15s;
  }
  .cal-day-head:hover:not(.today) .day-num { background: var(--bg4); }

  /* Calendar Grid */
  .cal-grid-scroll {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
  }
  .cal-grid-scroll::-webkit-scrollbar { width: 6px; }
  .cal-grid-scroll::-webkit-scrollbar-track { background: transparent; }
  .cal-grid-scroll::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 4px; }

  .cal-grid {
    display: flex;
    position: relative;
    min-height: calc(var(--hour-h) * 24);
  }

  .time-gutter {
    width: 60px;
    flex-shrink: 0;
    position: relative;
  }
  .time-label {
    position: absolute;
    right: 10px;
    font-size: 10px;
    font-family: 'DM Mono', monospace;
    color: var(--text3);
    transform: translateY(-50%);
    white-space: nowrap;
  }

  .cal-days-container {
    flex: 1;
    display: flex;
    position: relative;
  }
  .cal-day-col {
    flex: 1;
    border-left: 1px solid var(--border);
    position: relative;
  }
  .hour-line {
    position: absolute;
    left: 0; right: 0;
    height: 1px;
    background: var(--border);
  }
  .half-hour-line {
    position: absolute;
    left: 0; right: 0;
    height: 1px;
    background: rgba(255,255,255,0.03);
    border-top: 1px dashed rgba(255,255,255,0.04);
  }

  /* Time Blocks */
  .time-block {
    position: absolute;
    left: 3px; right: 3px;
    border-radius: 7px;
    padding: 5px 8px;
    cursor: pointer;
    overflow: hidden;
    transition: filter 0.15s, transform 0.15s;
    z-index: 2;
    border-left: 3px solid transparent;
    min-height: 24px;
  }
  .time-block:hover {
    filter: brightness(1.15);
    transform: scale(1.01);
    z-index: 10;
  }
  .time-block-title {
    font-size: 11px;
    font-weight: 600;
    line-height: 1.3;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .time-block-time {
    font-size: 9px;
    font-family: 'DM Mono', monospace;
    opacity: 0.75;
    margin-top: 2px;
  }
  .time-block-delete {
    position: absolute;
    top: 3px; right: 3px;
    width: 14px; height: 14px;
    border-radius: 4px;
    background: rgba(0,0,0,0.3);
    border: none;
    color: rgba(255,255,255,0.6);
    cursor: pointer;
    font-size: 9px;
    display: none;
    align-items: center; justify-content: center;
  }
  .time-block:hover .time-block-delete { display: flex; }

  /* Current time line */
  .now-line {
    position: absolute;
    left: 0; right: 0;
    height: 2px;
    background: #ff4c4c;
    z-index: 5;
    pointer-events: none;
  }
  .now-line::before {
    content: '';
    position: absolute;
    left: -4px; top: -4px;
    width: 10px; height: 10px;
    border-radius: 50%;
    background: #ff4c4c;
  }

  /* ─── MONTHLY VIEW ──────────────────────────── */
  .month-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    flex: 1;
    overflow-y: auto;
  }
  .month-grid::-webkit-scrollbar { width: 6px; }
  .month-grid::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 4px; }

  .month-day-head {
    padding: 10px;
    text-align: center;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    font-weight: 600;
    color: var(--text3);
    border-bottom: 1px solid var(--border);
    border-right: 1px solid var(--border);
    background: var(--bg2);
  }
  .month-cell {
    border-bottom: 1px solid var(--border);
    border-right: 1px solid var(--border);
    padding: 8px;
    min-height: 100px;
    cursor: pointer;
    transition: background 0.12s;
    position: relative;
  }
  .month-cell:hover { background: var(--bg3); }
  .month-cell.today { background: rgba(240,192,64,0.04); }
  .month-cell.other-month { opacity: 0.35; }
  .month-cell-num {
    font-size: 13px;
    font-weight: 600;
    color: var(--text2);
    margin-bottom: 5px;
    width: 24px; height: 24px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 50%;
  }
  .month-cell.today .month-cell-num {
    background: var(--accent);
    color: #0c0c10;
  }
  .month-block {
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 4px;
    margin-bottom: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    font-weight: 500;
    cursor: pointer;
  }
  .month-more {
    font-size: 10px;
    color: var(--text3);
    margin-top: 2px;
  }

  /* ─── MODAL ─────────────────────────────────── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(6px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }
  .modal-overlay.open {
    opacity: 1;
    pointer-events: all;
  }
  .modal {
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: 16px;
    width: 420px;
    padding: 28px;
    transform: translateY(12px) scale(0.98);
    transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1);
    box-shadow: 0 32px 80px rgba(0,0,0,0.6);
  }
  .modal-overlay.open .modal {
    transform: translateY(0) scale(1);
  }
  .modal-title {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 20px;
  }
  .form-group { margin-bottom: 16px; }
  .form-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--text3);
    margin-bottom: 7px;
    display: block;
  }
  .form-input {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: 9px;
    padding: 10px 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
  }
  .form-input:focus { border-color: var(--accent); }
  .form-input option { background: var(--bg3); }

  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .cat-selector {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }
  .cat-option {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 8px 10px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    cursor: pointer;
    transition: all 0.15s;
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    font-weight: 500;
    color: var(--text2);
  }
  .cat-option:hover { background: var(--bg3); color: var(--text); }
  .cat-option.selected {
    border-color: currentColor;
    background: var(--bg3);
    color: var(--text);
  }
  .cat-option-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

  .modal-actions {
    display: flex;
    gap: 10px;
    margin-top: 24px;
  }
  .btn-cancel {
    flex: 1;
    padding: 11px;
    border-radius: 9px;
    border: 1px solid var(--border2);
    background: transparent;
    color: var(--text2);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-cancel:hover { background: var(--bg3); color: var(--text); }
  .btn-save {
    flex: 2;
    padding: 11px;
    border-radius: 9px;
    border: none;
    background: var(--accent);
    color: #0c0c10;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-save:hover { background: var(--accent2); }

  /* Notification */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: 10px;
    padding: 12px 18px;
    font-size: 13px;
    color: var(--text);
    z-index: 200;
    transform: translateY(20px);
    opacity: 0;
    transition: all 0.25s;
    pointer-events: none;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  .toast.show { transform: translateY(0); opacity: 1; }

  /* Scrollbar global */
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 4px; }

  /* Drag ghost zone on time grid */
  .cal-day-col:hover { background: rgba(255,255,255,0.01); }

  /* Month empty header placeholder */
  .month-header-row {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    flex-shrink: 0;
  }

  /* Context click indicator */
  .click-indicator {
    position: absolute;
    width: 100%;
    height: 32px;
    background: rgba(240,192,64,0.08);
    border: 1px dashed rgba(240,192,64,0.3);
    border-radius: 5px;
    pointer-events: none;
    z-index: 1;
    display: none;
  }

  .progress-bar {
    height: 3px;
    background: var(--bg4);
    border-radius: 2px;
    margin-top: 8px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.4s ease;
  }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">TaskFlow <span>·</span></div>

  <div class="header-nav">
    <button class="view-btn active" data-view="day">Day</button>
    <button class="view-btn" data-view="3day">3 Days</button>
    <button class="view-btn" data-view="week">Week</button>
    <button class="view-btn" data-view="month">Month</button>
  </div>

  <div class="header-date-nav">
    <button class="date-nav-btn" id="prevBtn">‹</button>
    <span class="header-date-label" id="dateLabel"></span>
    <button class="date-nav-btn" id="nextBtn">›</button>
    <button class="today-btn" id="todayBtn">Today</button>
  </div>

  <div class="header-spacer"></div>

  <button class="add-task-btn" id="openModalBtn">
    <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M6.5 1v11M1 6.5h11" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
    Add Task
  </button>
</header>

<!-- BODY -->
<div class="app-body">

  <!-- SIDEBAR -->
  <aside>
    <div class="sidebar-section">
      <div class="sidebar-section-title">Categories</div>
      <div class="cat-list" id="catList">
        <div class="cat-item active" data-cat="all">
          <div class="cat-dot" style="background:#9896a8"></div>
          All Tasks
          <span class="cat-count" id="count-all">0</span>
        </div>
        <div class="cat-item" data-cat="work">
          <div class="cat-dot" style="background:var(--cat-work)"></div>
          Work
          <span class="cat-count" id="count-work">0</span>
        </div>
        <div class="cat-item" data-cat="personal">
          <div class="cat-dot" style="background:var(--cat-personal)"></div>
          Personal
          <span class="cat-count" id="count-personal">0</span>
        </div>
        <div class="cat-item" data-cat="health">
          <div class="cat-dot" style="background:var(--cat-health)"></div>
          Health
          <span class="cat-count" id="count-health">0</span>
        </div>
        <div class="cat-item" data-cat="creative">
          <div class="cat-dot" style="background:var(--cat-creative)"></div>
          Creative
          <span class="cat-count" id="count-creative">0</span>
        </div>
        <div class="cat-item" data-cat="learning">
          <div class="cat-dot" style="background:var(--cat-learning)"></div>
          Learning
          <span class="cat-count" id="count-learning">0</span>
        </div>
        <div class="cat-item" data-cat="other">
          <div class="cat-dot" style="background:var(--cat-other)"></div>
          Other
          <span class="cat-count" id="count-other">0</span>
        </div>
      </div>
    </div>

    <div class="sidebar-section" style="border-top:1px solid var(--border);padding-top:16px">
      <div class="sidebar-section-title">
        Today's Tasks
        <span id="completionRate" style="float:right;color:var(--accent);font-weight:700"></span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill" style="background:var(--accent);width:0%"></div>
      </div>
    </div>

    <div class="task-list-scroll" id="taskListScroll">
      <div class="empty-tasks" id="emptyTasks">
        No tasks yet.<br>Click <strong style="color:var(--accent)">+ Add Task</strong><br>to get started.
      </div>
    </div>
  </aside>

  <!-- MAIN CALENDAR -->
  <main id="mainArea">
  </main>

</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-title" id="modalTitle">New Task</div>

    <div class="form-group">
      <label class="form-label">Task Name</label>
      <input type="text" class="form-input" id="taskName" placeholder="What needs to be done?">
    </div>

    <div class="form-group">
      <label class="form-label">Category</label>
      <div class="cat-selector" id="catSelector">
        <button class="cat-option selected" data-cat="work">
          <div class="cat-option-dot" style="background:var(--cat-work)"></div> Work
        </button>
        <button class="cat-option" data-cat="personal">
          <div class="cat-option-dot" style="background:var(--cat-personal)"></div> Personal
        </button>
        <button class="cat-option" data-cat="health">
          <div class="cat-option-dot" style="background:var(--cat-health)"></div> Health
        </button>
        <button class="cat-option" data-cat="creative">
          <div class="cat-option-dot" style="background:var(--cat-creative)"></div> Creative
        </button>
        <button class="cat-option" data-cat="learning">
          <div class="cat-option-dot" style="background:var(--cat-learning)"></div> Learning
        </button>
        <button class="cat-option" data-cat="other">
          <div class="cat-option-dot" style="background:var(--cat-other)"></div> Other
        </button>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Date</label>
        <input type="date" class="form-input" id="taskDate">
      </div>
      <div class="form-group">
        <label class="form-label">Duration</label>
        <select class="form-input" id="taskDuration">
          <option value="0.5">30 min</option>
          <option value="1" selected>1 hour</option>
          <option value="1.5">1.5 hours</option>
          <option value="2">2 hours</option>
          <option value="3">3 hours</option>
          <option value="4">4 hours</option>
        </select>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Start Time</label>
        <input type="time" class="form-input" id="taskStartTime" value="09:00">
      </div>
      <div class="form-group">
        <label class="form-label">Priority</label>
        <select class="form-input" id="taskPriority">
          <option value="low">Low</option>
          <option value="medium" selected>Medium</option>
          <option value="high">High</option>
        </select>
      </div>
    </div>

    <div class="modal-actions">
      <button class="btn-cancel" id="cancelBtn">Cancel</button>
      <button class="btn-save" id="saveBtn">Add to Calendar →</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ─── STATE ─────────────────────────────────────────────
const state = {
  view: 'day',
  currentDate: new Date(),
  tasks: [],
  selectedCat: 'all',
  nextId: 1
};

const CATS = {
  work:     { label:'Work',     color:'var(--cat-work)',     bg:'var(--cat-work-bg)' },
  personal: { label:'Personal', color:'var(--cat-personal)', bg:'var(--cat-personal-bg)' },
  health:   { label:'Health',   color:'var(--cat-health)',   bg:'var(--cat-health-bg)' },
  creative: { label:'Creative', color:'var(--cat-creative)', bg:'var(--cat-creative-bg)' },
  learning: { label:'Learning', color:'var(--cat-learning)', bg:'var(--cat-learning-bg)' },
  other:    { label:'Other',    color:'var(--cat-other)',    bg:'var(--cat-other-bg)' },
};

const HOURS = Array.from({length:24}, (_,i)=>i);

// Seed sample tasks
function seedTasks() {
  const today = fmtDate(new Date());
  const tomorrow = fmtDate(new Date(Date.now() + 86400000));
  const samples = [
    {title:'Team standup meeting', cat:'work', date:today, startTime:'09:00', duration:0.5, priority:'high', done:false},
    {title:'Design system review', cat:'work', date:today, startTime:'10:00', duration:1.5, priority:'medium', done:false},
    {title:'Morning run 5k', cat:'health', date:today, startTime:'07:00', duration:1, priority:'medium', done:true},
    {title:'Read: Atomic Habits', cat:'learning', date:today, startTime:'20:00', duration:1, priority:'low', done:false},
    {title:'Lunch with Sarah', cat:'personal', date:today, startTime:'12:30', duration:1.5, priority:'low', done:false},
    {title:'Work on side project', cat:'creative', date:tomorrow, startTime:'19:00', duration:2, priority:'medium', done:false},
    {title:'Grocery shopping', cat:'personal', date:tomorrow, startTime:'11:00', duration:1, priority:'low', done:false},
  ];
  samples.forEach(t => { t.id = state.nextId++; state.tasks.push(t); });
}

function fmtDate(d) {
  return d.toISOString().split('T')[0];
}

function parseDate(s) {
  const [y,m,d] = s.split('-').map(Number);
  return new Date(y, m-1, d);
}

function sameDay(d1, d2) {
  return d1.getFullYear()===d2.getFullYear() && d1.getMonth()===d2.getMonth() && d1.getDate()===d2.getDate();
}

function fmtHour(h) {
  if(h===0) return '12 AM';
  if(h===12) return '12 PM';
  return h<12 ? `${h} AM` : `${h-12} PM`;
}

function fmtTime(h, m=0) {
  const hh = Math.floor(h), mm = m||0;
  const suffix = hh<12?'AM':'PM';
  const dh = hh===0?12:hh>12?hh-12:hh;
  return `${dh}:${String(mm).padStart(2,'0')} ${suffix}`;
}

function timeToFloat(timeStr) {
  const [h,m] = timeStr.split(':').map(Number);
  return h + m/60;
}

function floatToTime(f) {
  const h = Math.floor(f), m = Math.round((f-h)*60);
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
}

// ─── VIEWS ──────────────────────────────────────────────
function getDaysForView() {
  const d = new Date(state.currentDate);
  if(state.view==='day') return [new Date(d)];
  if(state.view==='3day') {
    return [0,1,2].map(i=>{ const x=new Date(d); x.setDate(x.getDate()+i); return x; });
  }
  if(state.view==='week') {
    const dow = d.getDay();
    return Array.from({length:7}, (_,i)=>{ const x=new Date(d); x.setDate(x.getDate()-dow+i); return x; });
  }
  return [];
}

function updateDateLabel() {
  const el = document.getElementById('dateLabel');
  const d = state.currentDate;
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  if(state.view==='day') {
    el.textContent = `${days[d.getDay()]}, ${months[d.getMonth()]} ${d.getDate()}`;
  } else if(state.view==='3day') {
    const end = new Date(d); end.setDate(end.getDate()+2);
    el.textContent = `${months[d.getMonth()]} ${d.getDate()} – ${d.getMonth()===end.getMonth()?'':months[end.getMonth()]+' '}${end.getDate()}`;
  } else if(state.view==='week') {
    const dow = d.getDay();
    const start = new Date(d); start.setDate(start.getDate()-dow);
    const end = new Date(start); end.setDate(end.getDate()+6);
    el.textContent = `${months[start.getMonth()]} ${start.getDate()} – ${start.getMonth()===end.getMonth()?'':months[end.getMonth()]+' '}${end.getDate()}, ${end.getFullYear()}`;
  } else {
    el.textContent = `${months[d.getMonth()]} ${d.getFullYear()}`;
  }
}

function navigate(dir) {
  const d = state.currentDate;
  if(state.view==='day') d.setDate(d.getDate()+dir);
  else if(state.view==='3day') d.setDate(d.getDate()+dir*3);
  else if(state.view==='week') d.setDate(d.getDate()+dir*7);
  else if(state.view==='month') d.setMonth(d.getMonth()+dir);
  render();
}

// ─── RENDER ─────────────────────────────────────────────
function render() {
  updateDateLabel();
  renderSidebar();
  if(state.view==='month') renderMonth();
  else renderTimeGrid();
}

function renderSidebar() {
  // counts
  const cats = Object.keys(CATS);
  const todayStr = fmtDate(new Date());
  const todayTasks = state.tasks.filter(t=>t.date===todayStr);
  document.getElementById('count-all').textContent = state.tasks.length;
  cats.forEach(c=>{
    const el = document.getElementById(`count-${c}`);
    if(el) el.textContent = state.tasks.filter(t=>t.cat===c).length;
  });

  // progress
  const done = todayTasks.filter(t=>t.done).length;
  const total = todayTasks.length;
  const pct = total>0 ? Math.round(done/total*100) : 0;
  document.getElementById('progressFill').style.width = pct+'%';
  document.getElementById('completionRate').textContent = total>0 ? `${pct}%` : '';

  // task list
  const container = document.getElementById('taskListScroll');
  const empty = document.getElementById('emptyTasks');
  const filtered = state.selectedCat==='all' ? state.tasks : state.tasks.filter(t=>t.cat===state.selectedCat);
  
  // remove old task items
  container.querySelectorAll('.task-item').forEach(el=>el.remove());

  if(filtered.length===0) {
    empty.style.display='block';
    return;
  }
  empty.style.display='none';

  // sort by date then time
  const sorted = [...filtered].sort((a,b)=>{
    if(a.date!==b.date) return a.date<b.date?-1:1;
    return timeToFloat(a.startTime)-timeToFloat(b.startTime);
  });

  sorted.forEach(task=>{
    const item = document.createElement('div');
    item.className = 'task-item' + (task.done?' done':'');
    item.dataset.id = task.id;
    const cat = CATS[task.cat];
    const startF = timeToFloat(task.startTime);
    const endF = startF + task.duration;
    item.innerHTML = `
      <div class="task-check ${task.done?'done':''}" data-check="${task.id}"></div>
      <div class="task-info">
        <div class="task-title">${task.title}</div>
        <div class="task-meta">
          <span class="task-cat-badge" style="background:${cat.bg};color:${cat.color}">${cat.label}</span>
          <span class="task-time-badge">${fmtTime(startF)}</span>
        </div>
      </div>
      <button class="task-delete" data-del="${task.id}">✕</button>
    `;
    container.insertBefore(item, empty);

    item.querySelector(`[data-check="${task.id}"]`).addEventListener('click', e=>{
      e.stopPropagation();
      toggleTask(task.id);
    });
    item.querySelector(`[data-del="${task.id}"]`).addEventListener('click', e=>{
      e.stopPropagation();
      deleteTask(task.id);
    });
    item.addEventListener('click', ()=> jumpToTask(task));
  });
}

function renderTimeGrid() {
  const main = document.getElementById('mainArea');
  const days = getDaysForView();
  const today = new Date();

  const dayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

  let html = `
    <div class="cal-header">
      <div class="cal-time-gutter"></div>
      <div class="cal-day-headers">
        ${days.map(d=>`
          <div class="cal-day-head ${sameDay(d,today)?'today':''}">
            <div class="day-name">${dayNames[d.getDay()]}</div>
            <div class="day-num">${d.getDate()}</div>
          </div>
        `).join('')}
      </div>
    </div>
    <div class="cal-grid-scroll" id="calScroll">
      <div class="cal-grid">
        <div class="time-gutter">
          ${HOURS.map(h=>`
            <div class="time-label" style="top:${h*64}px">${fmtHour(h)}</div>
          `).join('')}
        </div>
        <div class="cal-days-container" id="calDays">
          ${days.map((d,i)=>`
            <div class="cal-day-col" id="col-${i}" data-date="${fmtDate(d)}">
              ${HOURS.map(h=>`
                <div class="hour-line" style="top:${h*64}px"></div>
                <div class="half-hour-line" style="top:${h*64+32}px"></div>
              `).join('')}
            </div>
          `).join('')}
        </div>
      </div>
    </div>
  `;

  main.innerHTML = html;

  // Add click listeners to columns
  days.forEach((d, i) => {
    const col = document.getElementById(`col-${i}`);
    col.addEventListener('click', e => {
      if(e.target.closest('.time-block')) return;
      const rect = col.getBoundingClientRect();
      const y = e.clientY - rect.top;
      const hour = Math.floor(y / 64);
      const min = y % 64 >= 32 ? 30 : 0;
      openModal(fmtDate(d), `${String(hour).padStart(2,'0')}:${min===0?'00':'30'}`);
    });
  });

  renderTimeBlocks(days);

  // Current time line
  if(days.some(d=>sameDay(d,today))) {
    const idx = days.findIndex(d=>sameDay(d,today));
    const col = document.getElementById(`col-${idx}`);
    if(col) {
      const now = new Date();
      const topPx = (now.getHours()*60+now.getMinutes())/60*64;
      const line = document.createElement('div');
      line.className = 'now-line';
      line.style.top = topPx+'px';
      col.appendChild(line);
    }
  }

  // Scroll to 7am
  setTimeout(()=>{
    const scroll = document.getElementById('calScroll');
    if(scroll) scroll.scrollTop = 7*64 - 40;
  }, 50);
}

function renderTimeBlocks(days) {
  days.forEach((d, i) => {
    const col = document.getElementById(`col-${i}`);
    if(!col) return;
    const dateStr = fmtDate(d);
    const dayTasks = state.tasks.filter(t=>t.date===dateStr);

    dayTasks.forEach(task=>{
      const cat = CATS[task.cat];
      const startF = timeToFloat(task.startTime);
      const topPx = startF * 64;
      const heightPx = task.duration * 64 - 4;
      const endF = startF + task.duration;

      const block = document.createElement('div');
      block.className = 'time-block';
      block.dataset.id = task.id;
      block.style.cssText = `
        top:${topPx+2}px;
        height:${Math.max(heightPx,20)}px;
        background:${cat.bg};
        border-left-color:${cat.color};
        color:${cat.color};
        opacity:${task.done?0.5:1};
      `;
      block.innerHTML = `
        <div class="time-block-title">${task.done?'✓ ':''}${task.title}</div>
        ${heightPx>36?`<div class="time-block-time">${fmtTime(startF)} – ${fmtTime(endF)}</div>`:''}
        <button class="time-block-delete" data-del="${task.id}">✕</button>
      `;
      block.addEventListener('click', e=>{
        if(e.target.closest('.time-block-delete')) return;
        toggleTask(task.id);
      });
      block.querySelector(`[data-del="${task.id}"]`).addEventListener('click', e=>{
        e.stopPropagation();
        deleteTask(task.id);
      });
      col.appendChild(block);
    });
  });
}

function renderMonth() {
  const main = document.getElementById('mainArea');
  const d = new Date(state.currentDate.getFullYear(), state.currentDate.getMonth(), 1);
  const today = new Date();
  const daysInMonth = new Date(d.getFullYear(), d.getMonth()+1, 0).getDate();
  const startDow = d.getDay();
  const dayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

  let html = `
    <div class="month-header-row">
      ${dayNames.map(n=>`<div class="month-day-head">${n}</div>`).join('')}
    </div>
    <div class="month-grid" id="monthGrid">
  `;

  // prev month padding
  const prevMonth = new Date(d.getFullYear(), d.getMonth(), 0);
  for(let i=startDow-1; i>=0; i--) {
    const day = prevMonth.getDate()-i;
    html += `<div class="month-cell other-month"><div class="month-cell-num">${day}</div></div>`;
  }

  for(let day=1; day<=daysInMonth; day++) {
    const cellDate = new Date(d.getFullYear(), d.getMonth(), day);
    const dateStr = fmtDate(cellDate);
    const isToday = sameDay(cellDate, today);
    const tasks = state.tasks.filter(t=>t.date===dateStr).sort((a,b)=>timeToFloat(a.startTime)-timeToFloat(b.startTime));

    html += `<div class="month-cell ${isToday?'today':''}" data-date="${dateStr}">
      <div class="month-cell-num">${day}</div>
      ${tasks.slice(0,3).map(t=>{
        const cat = CATS[t.cat];
        return `<div class="month-block" style="background:${cat.bg};color:${cat.color}" data-id="${t.id}">${t.done?'✓ ':''}${t.title}</div>`;
      }).join('')}
      ${tasks.length>3?`<div class="month-more">+${tasks.length-3} more</div>`:''}
    </div>`;
  }

  // next month padding
  const totalCells = startDow + daysInMonth;
  const remaining = (7 - totalCells%7) % 7;
  for(let i=1; i<=remaining; i++) {
    html += `<div class="month-cell other-month"><div class="month-cell-num">${i}</div></div>`;
  }

  html += `</div>`;
  main.innerHTML = html;

  // Click on month cell
  document.querySelectorAll('.month-cell[data-date]').forEach(cell=>{
    cell.addEventListener('click', e=>{
      if(e.target.closest('.month-block')) return;
      openModal(cell.dataset.date);
    });
  });
  document.querySelectorAll('.month-block[data-id]').forEach(block=>{
    block.addEventListener('click', e=>{
      e.stopPropagation();
      const task = state.tasks.find(t=>t.id==block.dataset.id);
      if(task) toggleTask(task.id);
    });
  });
}

// ─── MODAL ──────────────────────────────────────────────
let selectedCatModal = 'work';

function openModal(date, time) {
  const overlay = document.getElementById('modalOverlay');
  document.getElementById('taskName').value = '';
  document.getElementById('taskDate').value = date || fmtDate(state.currentDate);
  document.getElementById('taskStartTime').value = time || '09:00';
  document.getElementById('taskDuration').value = '1';
  document.getElementById('taskPriority').value = 'medium';
  selectedCatModal = 'work';
  document.querySelectorAll('.cat-option').forEach(o=>{
    o.classList.toggle('selected', o.dataset.cat==='work');
  });
  overlay.classList.add('open');
  setTimeout(()=>document.getElementById('taskName').focus(), 200);
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}

function saveTask() {
  const name = document.getElementById('taskName').value.trim();
  if(!name) { showToast('Please enter a task name'); return; }
  const task = {
    id: state.nextId++,
    title: name,
    cat: selectedCatModal,
    date: document.getElementById('taskDate').value,
    startTime: document.getElementById('taskStartTime').value,
    duration: parseFloat(document.getElementById('taskDuration').value),
    priority: document.getElementById('taskPriority').value,
    done: false,
  };
  state.tasks.push(task);
  closeModal();
  render();
  showToast('Task added to calendar ✓');
}

function toggleTask(id) {
  const task = state.tasks.find(t=>t.id===id);
  if(task) { task.done = !task.done; render(); }
}

function deleteTask(id) {
  state.tasks = state.tasks.filter(t=>t.id!==id);
  render();
  showToast('Task removed');
}

function jumpToTask(task) {
  if(state.view==='month') return;
  state.currentDate = parseDate(task.date);
  state.view = 'day';
  document.querySelectorAll('.view-btn').forEach(b=>b.classList.toggle('active',b.dataset.view==='day'));
  render();
  setTimeout(()=>{
    const scroll = document.getElementById('calScroll');
    if(scroll) scroll.scrollTop = timeToFloat(task.startTime)*64-80;
  }, 80);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2500);
}

// ─── EVENTS ─────────────────────────────────────────────
document.getElementById('openModalBtn').addEventListener('click', ()=>openModal());
document.getElementById('cancelBtn').addEventListener('click', closeModal);
document.getElementById('saveBtn').addEventListener('click', saveTask);
document.getElementById('modalOverlay').addEventListener('click', e=>{
  if(e.target===e.currentTarget) closeModal();
});
document.getElementById('taskName').addEventListener('keydown', e=>{
  if(e.key==='Enter') saveTask();
});

document.querySelectorAll('.view-btn').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    state.view = btn.dataset.view;
    document.querySelectorAll('.view-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    render();
  });
});

document.getElementById('prevBtn').addEventListener('click', ()=>navigate(-1));
document.getElementById('nextBtn').addEventListener('click', ()=>navigate(1));
document.getElementById('todayBtn').addEventListener('click', ()=>{
  state.currentDate = new Date();
  render();
});

document.querySelectorAll('.cat-item').forEach(item=>{
  item.addEventListener('click', ()=>{
    state.selectedCat = item.dataset.cat;
    document.querySelectorAll('.cat-item').forEach(c=>c.classList.remove('active'));
    item.classList.add('active');
    renderSidebar();
  });
});

document.getElementById('catSelector').addEventListener('click', e=>{
  const opt = e.target.closest('.cat-option');
  if(!opt) return;
  selectedCatModal = opt.dataset.cat;
  document.querySelectorAll('.cat-option').forEach(o=>o.classList.remove('selected'));
  opt.classList.add('selected');
});

document.addEventListener('keydown', e=>{
  if(e.key==='Escape') closeModal();
  if(e.key==='ArrowLeft' && !e.target.closest('input,select,textarea')) navigate(-1);
  if(e.key==='ArrowRight' && !e.target.closest('input,select,textarea')) navigate(1);
});

// ─── INIT ────────────────────────────────────────────────
seedTasks();
render();

// Update "now" line every minute
setInterval(()=>{
  if(state.view!=='month') {
    const days = getDaysForView();
    const today = new Date();
    if(days.some(d=>sameDay(d,today))) render();
  }
}, 60000);
</script>
</body>
</html>
